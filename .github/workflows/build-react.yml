name: Build & Test React Frontend

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/build-react.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/build-react.yml"

jobs:
  test-and-build:
    name: Test and Build React assets
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npx vitest run

      - name: TypeScript type-check & Vite build
        run: npm run build

      - name: Upload static assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
