apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  labels:
    app: ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: ghcr.io/mtepenner/satellite-ground-station/ingestion:latest
          ports:
            - containerPort: 10000
              protocol: UDP
              name: udp-radio
            - containerPort: 10001
              protocol: TCP
              name: tcp-radio
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: UDP_ADDR
              value: "0.0.0.0:10000"
            - name: TCP_ADDR
              value: "0.0.0.0:10001"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 10001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 10001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
spec:
  selector:
    app: ingestion
  ports:
    - name: udp-radio
      protocol: UDP
      port: 10000
      targetPort: 10000
    - name: tcp-radio
      protocol: TCP
      port: 10001
      targetPort: 10001
  type: ClusterIP
